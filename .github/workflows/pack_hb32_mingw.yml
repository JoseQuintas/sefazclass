#
# pack_hb32_mingw.yml
#
# input:  hb32_mingw_xxxx.zip
# input:  mingw_xxxx.zip
# input:  addons_hb32_mingw_xxxx.zip
# output: pack_hb32_mingw_xxxx.zip
#

name: pack_hb32_mingw

on:
  #push:
  schedule:
   - cron: "30 4 1 * *"
  workflow_dispatch:
    inputs:
      name:
        description: 'pack_hb32_mingw'
        default: 'pack_hb32_mingw'
        required: true

jobs:

  mingw_0703:
    runs-on: windows-latest
    strategy:
       matrix:
          compiler:
          - mingw_0703
          - mingw_1420
          - mingw_1500

    steps:

    - name: load mingw_xxxx.zip from workflow
      uses: dawidd6/action-download-artifact@v6
      with:
         workflow: mingw.yml
         workflow_conclusion: success
         name: mingw_${{matrix.compiler}}
         path: c:\temp
         repo: JoseQuintas/sefazclass

    - name: load hb32_mingw_xxxx.zip from workflow
      uses: dawidd6/action-download-artifact@v6
      with:
         workflow: hb32_mingw.yml
         workflow_conclusion: success
         name: hb32_mingw_${{matrix.compiler}}
         path: c:\temp
         repo: JoseQuintas/sefazclass

    - name: load addons_hb32_mingw_xxxx.zip from workflow
      uses: dawidd6/action-download-artifact@v6
      with:
         workflow: addons_hb32_mingw.yml
         workflow_conclusion: success
         name: addons_hb32_mingw_${{matrix.compiler}}
         path: c:\temp
         repo: JoseQuintas/sefazclass

    - name: Unzip All
      env:
         PATH: c:\program files\7-zip
      run: |
         c:
         7z x -y c:\temp\hb32_mingw_${{matrix.compiler}}.7z -oc:\temp\harbour
         md c:\harbour\comp
         7z x -y c:\temp\mingw_${{matrix.compiler}}.7z -oc:\temp\harbour\comp
         md c:\harbour\addons
         7z x -y c:\temp\addons_hb32_mingw_${{matrix.compiler}}.7z -oc:\temp\harbour\addons

    - name: Create pack_hb32_mingw_xxxx.zip
      env:
         PATH: c:\program files\7-zip
      run: |
         c:
         7z a -r c:\temp\pack_hb32_mingw_${{matrix.compiler}}.7z c:\temp\harbour\*.* -xr'!.git' -xr'!.github' -xr'!.hbmk'

    - name: Save pack_hb32_mingw_xxxx.zip to workflow
      uses: actions/upload-artifact@v4
      with:
         name: pack_hb32_mingw_${{matrix.compiler}}
         path: c:\temp\pack_hb32_mingw_${{matrix.compiler}}.7z
